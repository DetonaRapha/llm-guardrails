name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes (determinístico, sem rede)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instala o pacote e as dependências de teste
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Roda a suíte de testes (inclui fail-closed e red-team)
        run: pytest -q

      - name: Roda a demo determinística (fumaça, sem API key)
        run: python -m examples.demo
